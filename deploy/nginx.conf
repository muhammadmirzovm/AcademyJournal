# The web container sits behind the host nginx (which terminates TLS) and
# routes by Host header: the API subdomain goes to Django, everything else
# serves the SPA. X-Forwarded-Proto is passed through from the host nginx so
# Django builds correct https:// URLs.

# ── api.journal.crmneo.com → Django backend (api / admin / static / media) ──
server {
    listen 80;
    server_name api.journal.crmneo.com;
    client_max_body_size 25m;

    # user-uploaded media straight from the shared volume
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }
}

# ── journal.crmneo.com (and anything else) → SPA ──
server {
    listen 80 default_server;
    server_name journal.crmneo.com _;
    client_max_body_size 25m;

    # allow the SPA to also resolve media if referenced same-origin
    location /media/ {
        alias /media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
