# HOST nginx site for AcademyJournal (NOT part of the Docker stack).
# Lives on the server at /etc/nginx/sites-available/academyjournal
# (symlinked into sites-enabled). Terminates TLS for both subdomains and
# proxies to the web container on 127.0.0.1:8080, which routes by Host.
#
# Certs: single Let's Encrypt cert covering both names, obtained with:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d journal.crmneo.com -d api.journal.crmneo.com

server {
    listen 80;
    listen [::]:80;
    server_name journal.crmneo.com api.journal.crmneo.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name journal.crmneo.com api.journal.crmneo.com;

    ssl_certificate     /etc/letsencrypt/live/journal.crmneo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/journal.crmneo.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
