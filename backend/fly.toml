app = 'academyjournal'
primary_region = 'iad'

[build]

release_command = "python manage.py migrate --noinput"

[env]
  PORT = "8000"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'codelearn_media'
  destination = '/app/media'

