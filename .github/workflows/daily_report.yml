name: Daily Attendance Report

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  report:
    name: Send daily report
    runs-on: ubuntu-latest
    steps:
      - name: Trigger report
        run: |
          curl -s -X POST https://academyjournal.fly.dev/api/auth/cron/daily-report/ \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}"
