name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: |
          mkdir -p "$HOME/.fly"
          mkdir -p "$HOME/.config/fly"
          echo "access_token: $TOKEN" > "$HOME/.fly/config.yml"
          echo "access_token: $TOKEN" > "$HOME/.config/fly/config.yml"
          echo "Config written. Token length: ${#TOKEN}"
          flyctl auth whoami
          flyctl deploy
        env:
          TOKEN: ${{ secrets.FLY_API_TOKEN }}
