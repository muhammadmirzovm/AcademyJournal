app = 'academyjournal'
primary_region = 'sin'

[build]

[env]
  PORT = "8000"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'codelearn_media'
  destination = '/app/media'

[deploy]
  release_command = 'python manage.py migrate --noinput'
